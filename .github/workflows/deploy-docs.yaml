name: Deploy VitePress & Build LLM JSON

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build LLM JSON (dist/llm)
        run: |
          pip install python-frontmatter
          python scripts/parse_to_json.py

      # src配下のMarkdownをVitePressドキュメントルートに同期
      - name: Sync source for Human (dist/human)
        run: |
          mkdir -p src  # srcが存在しなければ作成、あれば何もしない
          rsync -av --exclude='.vitepress' src/ dist/human/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress
        run: npm run docs:build # package.json に "docs:build": "vitepress build dist/human" を設定
        
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/human/.vitepress/dist'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4